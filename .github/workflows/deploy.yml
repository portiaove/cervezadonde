name: Deploy

# Deploys CODE (web build + API) to the VPS on every push to main.
# Data is NOT deployed here — it flows PC -> VPS via scripts/push-data.ps1.
# Requires two repo secrets:
#   DEPLOY_SSH_KEY  — private key whose public half is in the VPS authorized_keys
#   DEPLOY_HOST     — the VPS IP or hostname
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Uses .env.production -> VITE_API_URL=/api (same-origin via Caddy).
      - run: pnpm --filter @cervezadonde/web build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload web build
        run: |
          HOST="root@${{ secrets.DEPLOY_HOST }}"
          # Clear the directory CONTENTS (keep the inode) so Caddy's bind mount
          # stays valid — deleting the dir itself makes the mount go stale (404).
          ssh -i ~/.ssh/id_ed25519 "$HOST" 'mkdir -p /root/cervezadonde/deploy/web-dist && find /root/cervezadonde/deploy/web-dist -mindepth 1 -delete'
          scp -i ~/.ssh/id_ed25519 -r apps/web/dist/* "$HOST":/root/cervezadonde/deploy/web-dist/

      - name: Pull code and rebuild API
        run: |
          ssh -i ~/.ssh/id_ed25519 "root@${{ secrets.DEPLOY_HOST }}" '
            cd /root/cervezadonde &&
            git pull --ff-only &&
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
          '
