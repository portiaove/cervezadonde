# Production stack for a single VPS. See docs/13-deploy.md.
# Run from the repo root on the server:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cervezadonde-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bound to localhost only — reach it from your PC via an SSH tunnel for
    # the weekly data restore; never expose 5432 to the internet.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: cervezadonde-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WEB_ORIGIN: ${WEB_ORIGIN}
      LOG_LEVEL: info
      # The opening_hours evaluator reads the process wall clock (see
      # apps/api/src/openNow.ts). Without this, hours shift by 1-2h in UTC.
      TZ: Europe/Madrid
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"

  caddy:
    image: caddy:2
    container_name: cervezadonde-caddy
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # The built web app (apps/web/dist), uploaded from your PC.
      - ${WEB_DIST_PATH:-./web-dist}:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
